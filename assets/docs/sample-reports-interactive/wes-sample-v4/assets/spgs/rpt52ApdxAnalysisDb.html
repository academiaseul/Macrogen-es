<body>
<!-- wrapper -->

<div class="wrapper main main_test expand">
  <div class="gnb-dim"></div>
  <!-- gnb-menu -->
  <div class="gnb-menu-wrap contract scroll-y">
    <h1 class="logo">
    <a href="../../report.html">
    <script>
		logoImagePage(rptjs_main.report_info.countryCode);
    </script>
    </a>
    </h1>
    <div class="contract">
      <a href="javascript:void(0);" class="menu"><i class="ico i-menu"></i></a>
     
      <script>userMenu();</script>
    </div>
    <div class="expand">
        <div class="gnb-menu">
        	<script>
        	  leftMenu(rptjs_menu.children,"other");

        	</script>
		</div>
        <div class="download">
            <script>
          	 	btnPDF(rptjs_main.order_info,"other");
           </script>
        </div>

  <!-- // gnb-menu -->
	<script>
		        $('.wrapper, .gnb-menu-wrap').addClass('expand');
		        $('.wrapper, .gnb-menu-wrap').removeClass('contract');
	</script>
	<!-- container -->
	<div class="container">
        <div class="header">
            <strong class="title">Research Use Only</strong>
            <div class="right">
                <span class="path">
                    <script>
                      topMenu();
                 	</script>
                </span>
            </div>
        </div>
        <div class="top-btn">
            <a href="#">TOP</a>
        </div>
		<div class="content">

            <h1 class="title-type1"><script>document.write(rptjs_analysis_database.title);</script><!-- Analysis Database --></h1>
            
            <script>
            for(var contentsCnt in rptjs_analysis_database.contents){
            	switch (rptjs_analysis_database.contents[contentsCnt].type){
            	case "desc":
            		underTitleDescObjectStyleType2(rptjs_analysis_database.contents, contentsCnt);
            		break;
            	
            	case "img":
            		document.write('<div class="title-type2">'+rptjs_analysis_database.contents[contentsCnt].title+'</div>');
            		document.write('<div class="text-type3">'+rptjs_analysis_database.contents[contentsCnt].subTitle+'</div>');
            		//document.write('<div class="img-sequence-ontology">');
            		document.write('<div style="text-align:center">');
            		document.write('<img src=../files/'+rptjs_analysis_database.contents[contentsCnt].path+' alt="">');
            		document.write('</div>');

            		
            		break;
            	
            	case "table":
            		if(rptjs_analysis_database.contents[contentsCnt].header.length >0){
                		tableObjStyleNonPaging(rptjs_analysis_database.contents, contentsCnt);
                		}
            		
            		for(var le in rptjs_analysis_database.contents[contentsCnt].legend){
            			for(var ch in rptjs_analysis_database.contents[contentsCnt].legend[le].children){
            				//console.log("value!!---"+rptjs_analysis_database.contents[contentsCnt].legend[le].children[ch].value);
            				document.write('<p class="text-star">');
                    		document.write('<spna class="star">*</spna> '+rptjs_analysis_database.contents[contentsCnt].legend[le].children[ch].value);
                    		document.write('</p>'); 
            			}
        			}
            		
            		break;
            	
            	case "table-custom":
            		
            		if(rptjs_analysis_database.contents[contentsCnt].header.length >0){
                		//tableObjStyleNonPaging(rptjs_analysis_database.contents, contentsCnt);
            			tableCustomObjDatatables(rptjs_analysis_database, contentsCnt, contentsCnt);
                		}
            		
            		for(var le in rptjs_analysis_database.contents[contentsCnt].legend){
            			for(var ch in rptjs_analysis_database.contents[contentsCnt].legend[le].children){
            				//console.log("value!!---"+rptjs_analysis_database.contents[contentsCnt].legend[le].children[ch].value);
            				document.write('<p class="text-star">');
                    		document.write('<spna class="star">*</spna> '+rptjs_analysis_database.contents[contentsCnt].legend[le].children[ch].value);
                    		document.write('</p>'); 
            			}
        			}
            		
            		
            		break;
            	
            	case "box":
            		//console.log("box::"+contentsCnt);
            		boxObj(rptjs_analysis_database.contents, contentsCnt);
            		break;
            		
            	}
            	
            }
            
            
            </script>
            
            
            
            

        </div>
	</div>
	<!-- // container -->

			var yearStr = rptjs_main.order_info.dateReported.split(".");
			footerCountryCodeTxt(rptjs_main.report_info.countryCode, yearStr[0]);
		</script>

	<!-- // layout popup -->
	<!-- orderinfo_popup -->

	<div class="layerpopup" id="orderinfo_popup">
		<div class="dim"></div>
		<div class="popup pop-orderinfo">
			<a href="javascript:void(0);" class="close" onclick="popClose('#orderinfo_popup');"><i class="ico ico-close"></i></a>
			<div class="pop-header">
				<p class="pop-tit pop-custom1-title">Order Information</p>
			</div>
			<div class="pop-body">
				<div style="margin-top: 50px;">
					<div>
						<table class="tb-orderinfo" style="width: 779px; table-layout:fixed;">
							<tr>
								<td rowspan="3" style="width: 215.9px;"><img style="vertical-align: middle;" src="../images/default_user_logo.png"></td>
								<td style="width:563px;"><div class="user_info_modal_div_clientNm"><script>document.write(rptjs_main.order_info.clientName);</script></div></td>
							</tr>
							<tr><td><div class="user_info_modal_div_clientOrg"><script>document.write(rptjs_main.order_info.clientOrganization);</script></div></td></tr>
							<tr><td>
									<span class="user_info_modal_div_txt4">Order Number</span>
									<span class="user_info_modal_div_txt5"><script>document.write(rptjs_main.order_info.orderNumber);</script></span>
							</td></tr>
						</table>
					</div>
				</div>
				<div style="margin-top: 70px; margin-bottom: 10px;">
					<div>
						<table class="tb-orderinfo-data" style="width: 779px; table-layout:fixed; border-left: 2px solid #ffffff;">
							<script>
								for(var strCnt in rptjs_main.order_info.extra_info.header){
									document.write("<tr><td style='width:215.9px;'><span class='user_info_modal_div_txt6'>"+rptjs_main.order_info.extra_info.header[strCnt]+"</span><td><td class='user_info_modal_div_txt7' style='width:563px; white-space:pre-line;'>"+rptjs_main.order_info.extra_info.data[strCnt]+"<td><tr>");
								}
							</script>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
	
	<!-- //orderinfo_popup -->

</body>
