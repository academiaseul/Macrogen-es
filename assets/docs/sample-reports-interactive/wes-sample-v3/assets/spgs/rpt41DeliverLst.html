	        	if(rptjs_main.report_info.templateCode == "WES04" || rptjs_main.report_info.templateCode == "WES05"){
	        		for(var contentsLen in rptjs_deliverables_list.contents){
	        			
	        			var html="";
	        			
	        			if(rptjs_deliverables_list.contents[contentsLen].type=="table"){
	        				switch(contentsLen){
	        				//Deliverables List---title

	        				case "0":
	        					
	        					html+='<div class="data-list-type1">';
	        					html+='<h2 class="title-type2">'+rptjs_deliverables_list.contents[contentsLen].title+'</h2>';
	        					
	        					
	        					html+= "<div class='data-list-type1'>";
	                    		html+= "<div class='list-header'>";
	                    		html+= "<div class='row'>";
	                    		
		                    		var header_len = rptjs_deliverables_list.contents[contentsLen].header.length;
		                    		for(var j=0; j<header_len ;j++){
		                    			if(j==0){
		                    				html+="<div class='cell'style='width:auto;' >"+rptjs_deliverables_list.contents[contentsLen].header[j]+"</div>";
		                    			}else{
		                        			html+="<div class='cell'style='width:30%;' >"+rptjs_deliverables_list.contents[contentsLen].header[j]+"</div>";
		
		                    			}
		                    		}
	                    			
		                    		if((rptjs_deliverables_list.contents[contentsLen].tooltip).length>0){
		                    		html+="<div class='cell' style='width:6%;'>";
			                    		html+="<div class='tooltip-wrap'>";
			                    		html+="<button class='tooltip' onclick='popOpen('#popup')'><i class='ico i-tooltip-more'></i></button>";
			                    		
			                    		html+='<div class="tooltip-layer" style="width:540px">';
			                    		html+='<ul class="list-type1">';
			                    		for(var tooltipLen in rptjs_deliverables_list.contents[contentsLen].tooltip){
			                    			for(var ch in rptjs_deliverables_list.contents[contentsLen].tooltip[tooltipLen].children){
					                    		html+='<li><b class="c-blue">'+rptjs_deliverables_list.contents[contentsLen].tooltip[tooltipLen].children[ch].key+'</b> : '+rptjs_deliverables_list.contents[contentsLen].tooltip[tooltipLen].children[ch].value+'</li>';
			                    			}
			                    		}
			                    		html+='</ul>';
			                    		html+="</div>";
			                    		
			                    		html+="</div>";
		                    		html+="</div>";
		                    		}
		                    		
	                    		html+="</div>";
	                    		html+="</div>";
	                    		html+="</div>";
	                    		
	                    		
	                    		html+="<div class='list-body'>";
	                    			var data_len = rptjs_deliverables_list.contents[contentsLen].data.length;
	                    			
	                    			for(var j=0; j<data_len ;j++){
	                    				var data_arr_len = rptjs_deliverables_list.contents[contentsLen].data[j].length;
	                    				
	                    				html+="<div class='row'>";
	                    				html+="<div class='bg'></div>";
	                    				for(var k=0; k<data_arr_len ; k++){
	                    					
	                    					
	                    					//console.log("data--"+rptjs_deliverables_list.contents[contentsLen].data[j][k]);
	                    					if(k==0){
	                    						html+="<div class='cell' style='width:auto;'>";
	    	                    				html+="<a href='javascript:void(0);' class='link'><i class='ico i-zip'></i>";
	    	                    				html+="<span>"+rptjs_deliverables_list.contents[contentsLen].data[j][k]+"</span>";
	    	                    				html+="</a></div>";
	                    					}else{
	                    						html+="<div class='cell' style='width:30%;'>";
	    	                    				html+="<span>"+rptjs_deliverables_list.contents[contentsLen].data[j][k]+"</span>";
	    	                    				html+="</a></div>";
	                    					}
	                    					if(k== (data_arr_len-1)){
	                    						html+="<div class='cell' style='width:6%;'></div>";
	                    					}
	                    					
	                    				}
	                    				
	                    				html+="</div>";
	                    				
	                    			}
	                            html+="</div>";
	                    		
	                    		html+="</div>";
	                    		
	                    		document.write(html);
	                    		
	        					break;
	        					default:
	        						
	        						var tooltipLen = rptjs_deliverables_list.contents[contentsLen].tooltip.length;
	                    		//console.log("tooltip:::"+tooltipLen);
	                    		
	                   				
	                   			 
		                   			var html="";
		                          	html+='<div class="dataset-table2 merge-tb">';
		         		        	html+='<h2 class="title-type2">'+rptjs_deliverables_list.contents[contentsLen].title+'</h2>';

		         		        	}

		         		        	html+='</thead>';
		         		        	html+='<tbody>';

		         		        			}
		         		        			html+='</tr>';
		         		        		}
		
		         		        		
		         		            html+='</tbody>';
		         		            html+='</table>';
		         		            html+='</div>';
		         		            document.write(html);
		         		            
	        						break;
	        					
	        				}
                    	}
	        			
	        			
	        			
	        			
	        			
	        			
	        		}
	        	
	        	}else{
	        	
	        	for(var contentsLen in rptjs_deliverables_list.contents){
	        		
		        	var html="";
		        	var pre="";
		        	var mergeCnt=0;
		        	var idx = contentsLen;
		        	var obj = rptjs_deliverables_list.contents;
		        	var tbId="tb_"+idx;
		        	html+='<div class="dataset-table2 merge-tb">';
		        	html+='<h2 class="title-type2">'+obj[idx].title+'</h2>';
		        	html+='<table id="tb_'+idx+'">';  
		        	html+='<thead>';
		        		html+='<tr>';
		        			
		        			for(var headerCnt in obj[idx].header){
		        				switch(headerCnt){
		        				case "0":
		        					html+='<th style="width: 20%;">'+obj[idx].header[headerCnt]+'</th>';
		        					break;
		        				case "1":
		        					html+='<th style="width: 33%;">'+obj[idx].header[headerCnt]+'</th>';
		        					break;
		        					
		        				default:
		        					html+='<th style="width: auto;">'+obj[idx].header[headerCnt]+'</th>';
		        					break;
		        				
		        					
		        				}
		        				/* html+='<th style="width: auto;">'+obj[idx].header[headerCnt]+'</th>'; */
		        			}
		        			
		        					
		        	    html+='</tr>';
		        	html+='</thead>';
		        	html+='<tbody>';
		        	for(var dataCnt in obj[idx].data){
		        		html+='<tr>';
		        			for(var cnt in obj[idx].data[dataCnt]){
		        				if(cnt == 0){
		        					
		        					if(pre== null || pre==""){
		        						pre = obj[idx].data[dataCnt][cnt];
		        					}
		        					
		        					
		        					if(mergeCnt%2 ==0){
		        						if(pre == obj[idx].data[dataCnt][cnt]){
		        							html+='<td class="tit merge-row">'+obj[idx].data[dataCnt][cnt]+'</td>';
		        						}else{
		        							html+='<td class="tit merge-row-bg">'+obj[idx].data[dataCnt][cnt]+'</td>';
		        							mergeCnt++;
		        							pre = obj[idx].data[dataCnt][cnt];
		        						}
		        					}else{
		        						if(pre == obj[idx].data[dataCnt][cnt]){
		        							html+='<td class="tit merge-row-bg">'+obj[idx].data[dataCnt][cnt]+'</td>';
		        						}else{
		        							html+='<td class="tit merge-row">'+obj[idx].data[dataCnt][cnt]+'</td>';
		        							mergeCnt++;
		        							pre = obj[idx].data[dataCnt][cnt];
		        						}
		        					}
		        					
		        					
		        				}else{
		        					if(mergeCnt%2==0){
		        						html+='<td class="merge-row">'+obj[idx].data[dataCnt][cnt]+'</td>';
			        					
		        					}else{
		        						html+='<td class="merge-row-bg">'+obj[idx].data[dataCnt][cnt]+'</td>';
			        					
		        					}
		        					
		        				}
		        			}
		        			
		        		html+='</tr>';
		        		
		        	}
		            html+='</tbody>';
		            html+='</table>';
		            html+='</div>';
		                
		            document.write(html);
		            
		           
		                $("#tb_"+idx).DataTable({
		                    "info":false,"ordering": false,"searching": false,"lengthChange": false, "paging":   false,
		                });
	                
	                
	                } 
	        	
	        	$('#tb_0').rowspan(0); 
	        	}
	        	
	        	</script>
	                	                  
        </div>
