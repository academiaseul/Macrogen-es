			for(var contentsLen in obj.contents){
				let mycircleChart; 
				var mybarChart ;
				var myreadLengthChart ;
				var mysubreadLengthChart;
	
				switch(obj.contents[contentsLen].type){
					case "plot-circle":
						var bgcolor="";
						var data="";
						var percentage="";
						if(contentsLen%2==1){ bgcolor=['#4e64c0', 'rgba(0,0,0,0)'];
						}else{ bgcolor=['#06b2b0', 'rgba(0,0,0,0)'] }
						data= [obj.contents[contentsLen].data.datasets[0].data, 100-obj.contents[contentsLen].data.datasets[0].data];
						if(mycircleChart instanceof Chart){ mycircleChart.destroy(); }
						mycircleChart = circleChart({
						id:'circle-chart_1_'+tabNameId+"_"+sectionLen+"_"+contentsLen,
						    data:data, bgColor:bgcolor, count:'43'
						 });
	            	break;
					case "plot-bar":
						var bgcolor="";
						var barChartData = new Array();
						for(var dataLen in obj.contents[contentsLen].data.datasets){
							if(dataLen%2==0){
								bgcolor=barChartColor[0];
							}else{
								bgcolor=barChartColor[1];
							}
							var data = {
									type: "bar",
									data: obj.contents[contentsLen].data.datasets[dataLen].data,
									bgColor: bgcolor
							};
							barChartData.push(data);
						}
						if(mybarChart instanceof Chart){ mybarChart.destroy(); }
						 mybarChart= barChart({
						        id:'bar-chart_'+tabNameId+"_"+sectionLen+"_"+contentsLen,
						        label: obj.contents[contentsLen].data.labels,
						        data: barChartData,
						        options:{
						            maxBarThickness: 18,
						            barThickness: 18,
						            scales:{
						                x:{
						                    ticks:{ color : '#212121', font:{size:18}},
						                }
						            }
						        },topvalue : true,
						    });					
						break;
						
					case "plot-line":
						var labelArr = new Array();
						var len = (obj.contents[contentsLen].data.datasets).length;
						var labelArr1 = ["Proportion of target bases","Cumulative fraction of target"];
						
						switch(len){
							case 1:
								var label= {
	                            	label:'Read Count'
	                        	};
								labelArr.push(label);
								if(readLengthChart instanceof Chart){ readLengthChart.destroy(); }
								myreadLengthChart = readLengthChart({
									id:"lineChartCanvas_"+tabNameId+"_"+sectionLen+"_"+contentsLen,
			                        labelArr: obj.contents[contentsLen].data.labels,
			                        data1Arr: obj.contents[contentsLen].data.datasets[0].data,
			                        colorType: 'type1',
			                        options:{
			                            scales:{
			                                y:{
			                                    title:{text: 'Read Count'},
			                                    grid: {
			                                        tickLength:5,
			                                        tickColor:'#dde0e3',
			                                        color: function(context) {
			                                        if (context.tick.value > 0) {
			                                            return 'rgba(0,0,0,0)';
			                                        }
			                                        return '#dde0e3';
			                                        },
			                                    },
			                                },
			                                x:{
			                                    title:{text: obj.contents[contentsLen].data.datasets[0].label},
			                                    grid: {
			                                        display:true,
			                                        color: function(context) {
			                                        if (context.tick.value > 0) {
			                                            return 'rgba(0,0,0,0)';
			                                        }
			                                        return '#dde0e3';
			                                        },
			                                    },
			                                }
			                            }
			                        }
			                    });
								break;
								
							case 2:
								for(var i=0; i<len ; i++){
									var label= {
				                            label: labelArr1[i]
				                        };
									labelArr.push(label);
								}
		                        if(mysubreadLengthChart instanceof Chart)
			                    {
		                        	mysubreadLengthChart.destroy();
			                    }
		                        mysubreadLengthChart = subreadLengthChart({
		                            id:"lineChartCanvas_"+tabNameId+"_"+sectionLen+"_"+contentsLen,
		                            dataset: labelArr,
		                            xLabel:'Coverage Depth'
		                        });
							break;
							
						}
					break;	
	            }
        	}
    }
}
    
    
    
    

</script>
