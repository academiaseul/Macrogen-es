        var si_list = ['NumofSNP'];

        //title
        var type = " - WGS Analysis Report"

        //stat_list를 format_list로 parsing
        function arr_format(array) {
            var format_list = [];
            for (var i = 0, key; key = array[i]; i++) {
                var temp = {};
                switch (key) {
                    case "samplename":
                        temp["head"] = key;
                        temp["format"] = "td_char";
                        break;
                    default:
                        temp["head"] = key;
                        if (comma_list.indexOf(key) != -1) {
                            temp["format"] = "comma";
                        } else {
                            temp["format"] = "td_num";
                        }
                }
                format_list.push(temp);
            }
            return format_list
        }

        var format_list = arr_format(stat_list);

        //Total.js에서 array 가져와서 parsing
        function arr_si(array) {
            var array_si = [];
            for (var i = 0; i < array.length; i++) {
                var temp = {};
                temp['Sample'] = array[i]['samplename'];
                temp['Categories'] = [];
                temp['Categories'].push({
                    'Name': 'SNP',
                    'Value': Number(array[i]['NumofSNP'])
                })
                temp['Categories'].push({
                    'Name': 'INDEL',
                    'Value': Number(array[i]['NumofInsertion']) + Number(array[i]['NumofDeletion'])
                })

                array_si.push(temp);
            }
            return array_si
        }

        var array_si = arr_si(array);

        function jsn_var(array, i) {
            var snp_indel = Number(Number(array[i].NumofSNP) + Number(array[i].NumofInsertion) + Number(array[i].NumofDeletion)).toLocaleString('en');
            var cnv_tot = Number(Number(array[i].CopyNGains) + Number(array[i].CopyNLosses)).toLocaleString('en');
            var sv_tot = Number(Number(array[i].Insertions) + Number(array[i].Deletions) + Number(array[i].Duplications) + Number(array[i].Inversions) + Number(array[i].Translocations)).toLocaleString('en');
            var json_var = {
                "name": array[i]['samplename'],
                "children": [{
                    "name": "CNV " + cnv_tot,
                    "children": [{
                        "name": "Gain",
                        "value": array[i].CopyNGains,
                        "parent": "CNV"
                    }, {
                        "name": "Loss",
                        "value": array[i].CopyNLosses,
                        "parent": "CNV"
                    }]
                }, {
                    "name": "SV " + sv_tot,
                    "children": [{
                        "name": "Insertion",
                        "value": array[i].Insertions,
                        "parent": "SV"
                    }, {
                        "name": "Deletion",
                        "value": array[i].Deletions,
                        "parent": "SV"
                    }, {
                        "name": "Duplication",
                        "value": array[i].Duplications,
                        "parent": "SV"
                    }, {
                        "name": "Inversion",
                        "value": array[i].Inversions,
                        "parent": "SV"
                    }, {
                        "name": "Translocation",
                        "value": array[i].Translocations,
                        "parent": "SV"
                    }]
                }, {
                    "name": "SNP/INDELS " + snp_indel,
                    "children": [{
                        "name": "Synonymous variant",
                        "value": array[i].synonymous_variant,
                        "parent": "SNP/INDELS"
                    }, {
                        "name": "Nonsynonymous variant",
                        "value": array[i].missense_variant,
                        "parent": "SNP/INDELS"
                    }, {
                        "name": "Frameshift variant",
                        "value": array[i].frameshift_variant,
                        "parent": "SNP/INDELS"
                    }, {
                        "name": "Splicing variant",

                        "parent": "SNP/INDELS"
                    }, {
                        "name": "Stop gain",

                        "parent": "SNP/INDELS"
                    }, {
                        "name": "Stop lost",
                        "value": array[i].stop_lost,
                        "parent": "SNP/INDELS"
                    }]
                }]
            };
            return json_var
        }

        var json_var = jsn_var(array, 0);
