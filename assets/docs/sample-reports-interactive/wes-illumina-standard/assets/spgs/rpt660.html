<style type="text/css">
.kitBoxDiv {
	width: 100%;
}

.kitBox {
  width: 340px;
  height: 100px;
  margin: auto;
  padding: 20px 54px;
  border-radius: 50px;
  box-shadow: 3px 6px 6px 0 rgba(0, 0, 0, 0.2);
  /* old browsers */
  background: #f0f0f0;
  background: linear-gradient(284deg, rgba(237, 237, 237, 0.68), rgba(255, 255, 255, 0.3));
  text-align: center;
}

.kitBox .key{
  width: 112px;
  height: 19px;
  margin: auto;
  font-size: 16px;
  font-weight: normal;
  font-stretch: normal;
  font-style: normal;
  line-height: 1.88;
  letter-spacing: normal;
  text-align: left;
  color: #9e9e9e;
}

.kitBox .value{
  width: 232px;
  height: 33px;
  margin: 8px 0 0;
  font-size: 28px;
  font-weight: normal;
  font-stretch: normal;
  font-style: normal;
  line-height: 1.07;
  letter-spacing: normal;
  text-align: center;
  color: #212121;
}

.easy-table table{border-collapse: collapse;}
.easy-table thead tr{background-color: rgba(188, 218, 253, 0.3) !important; min-height:40px;}
.easy-table tbody tr td{
  height:40px; 
  border:1px solid #e4f1fd !important;
  box-sizing: border-box; 
  vertical-align: middle;
  padding: 5px;
  font-size: 14px; 
  text-align:center; 
  white-space:nowrap;
  color:#616161;
}
.easy-table tbody tr:hover {background-color: rgba(252,209,159, 0.3);}
.pop-body::-webkit-scrollbar:vertical{width:15px;}
.pop-body::-webkit-scrollbar:horizontal{height:15px;}
.pop-body::-webkit-scrollbar-thumb{background-color:#223a9d;border-radius:10px;}
.pop-body::-webkit-scrollbar-track{background-color:#e0e0e0;border-radius:10px;}

</style>
