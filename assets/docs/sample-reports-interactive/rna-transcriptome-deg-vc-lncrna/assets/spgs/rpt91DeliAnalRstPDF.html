function getIconInfo(iconNm){
	var imgInfo = "";
	switch(iconNm){
		case "hdd":{imgInfo = "../images/pdf/ic/icon/ico_folder.png";};break;
		case "folder":{imgInfo = "../images/pdf/ic/icon/ico_folder.png";};break;
		case "html":{imgInfo = "../images/pdf/ic/icon/ico_html.svg";};break;
		case "index":{imgInfo = "../images/pdf/ic/icon/ico_index.svg";};break;
		case "txt":{imgInfo = "../images/pdf/ic/icon/ico_txt.svg";};break;
		case "excel":{imgInfo = "../images/pdf/ic/icon/ico_excel.svg";};break;
		case "gz":{imgInfo = "../images/pdf/ic/icon/ico_gz.svg";};break;
		case "zip":{imgInfo = "../images/pdf/ic/icon/ico_zip.svg";};break;
		case "tar":{imgInfo = "../images/pdf/ic/icon/ico_tar.png";};break;
	
	}
	return imgInfo;
}

</script>
