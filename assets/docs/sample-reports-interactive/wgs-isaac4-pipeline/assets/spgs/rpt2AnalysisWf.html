</script>
	<!-- container -->
	<div class="container">
        <div class="header">
            <strong class="title">Research Use Only</strong>
            <div class="right">
                <span class="path">
                    <select class="noline" onchange="if(this.value) location.href=(this.value);">
                        <option value="../../report.html">Home</option>
                    </select>

                      topMenu();

        <div class="top-btn">
            <a href="#">TOP</a>
        </div>
		<div class="content">
            <h1 class="title-type1">Analysis Workflow</h1>
            <div class="data-img-box">
            	<div class="mermaid" id="draw_flowchart"></div>
            </div>
            	
          <script>
          var pre="";
          for(var contentsLen in rptjs_analysis_wf.contents){
        	  
        	  if(pre == ""){
        		  pre = rptjs_analysis_wf.contents[contentsLen].type;
        	  }
        	  
        	  
        	  if(pre != "" && pre != rptjs_analysis_wf.contents[contentsLen].type){
        		  if(rptjs_analysis_wf.contents[contentsLen].type!= "desc"){
        			if(rptjs_analysis_wf.contents[contentsLen].type!= "table-custom"){
        		  		document.write('<div class="hor-line" style="margin-bottom:0"></div>');
        			 }
        		  pre = rptjs_analysis_wf.contents[contentsLen].type;
        		  }
        	  }
        	  
        	  
        	  
        	 switch(rptjs_analysis_wf.contents[contentsLen].type){
        	 case "flowchart":
        		var graphData=rptjs_analysis_wf.contents[contentsLen].graphTable;
        		var element = document.getElementById("draw_flowchart");
                 
                
                 //v8    
                var graph =   mermaidAPI.render('gh',graphData,function(svgCode){ 
                 	element.innerHTML=svgCode; 
             	});
                
                 
                 
        		 break;
        	 case "desc":
        		 document.write(contentsDescObjectStyle1(rptjs_analysis_wf.contents[contentsLen]));
        		 break;
        	 case "table":
        		 
        		 switch(rptjs_analysis_wf.contents[contentsLen].title){
        		 case "Tool Parameter":
        			 tableMergeDefault(rptjs_analysis_wf.contents, contentsLen);
        			 document.write('<div style="height:30px"></div>');
        			 break;
        			 
        		 case "Tool Version":
        			 tableMergeDefault(rptjs_analysis_wf.contents, contentsLen);
        			 document.write('<div style="height:30px"></div>');
        			 break;
        			 
        		 default:
        			tableObjStyleNonPaging(rptjs_analysis_wf.contents,contentsLen);
        		 	document.write('<div style="height:30px"></div>');
        			 break;
        		 
        		 }
        		 break;
        		 
        	 case "table-custom":
        		 document.write('<h2 class="title-type2">'+rptjs_analysis_wf.contents[contentsLen].title+'</h2>');
				 tableCustomObjDatatables(rptjs_analysis_wf, contentsLen, contentsLen);
     		 	
				 document.write('<div style="height:30px"></div>');
     			 break;
        		 
        	
        	 
        	 }
          }
          
          
          
          </script>
