        //stat_list를 format_list로 parsing
        function arr_format(array) {
            var format_list = [];
            for (var i = 0, key; key = array[i]; i++) {
                var temp = {};
                switch (key) {
                    case "samplename":
                        temp["head"] = key;
                        temp["format"] = "td_char";
                        break;
                    default:
                        temp["head"] = key;
                        if (comma_list.indexOf(key) != -1) {
                            temp["format"] = "comma";
                        } else {
                            temp["format"] = "td_num";
                        }
                }
                format_list.push(temp);
            }
            return format_list

        var format_list = arr_format(stat_list);

        //Total.js에서 array 가져와서 parsing
        function arr_si(array) {
            var array_si = [];
            for (var i = 0; i < array.length; i++) {
                var temp = {};
                temp['Sample'] = array[i]['samplename'];
                temp['Categories'] = [];
                temp['Categories'].push({
                    'Name': 'SNP',
                    'Value': Number(array[i]['snp'])
                })
                temp['Categories'].push({
                    'Name': 'INDEL',
                    'Value': Number(array[i]['smallinsert']) + Number(array[i]['smalldelete'])
                })

                array_si.push(temp);
            }
            return array_si
        }

        var array_si = arr_si(array);

            var snp_indel = Number(Number(array[i].snp) + Number(array[i].smallinsert) + Number(array[i].smalldelete)).toLocaleString('en');
            var cnv_tot = Number(Number(array[i].cnv_gain) + Number(array[i].cnv_loss)).toLocaleString('en');

            var json_var = {
                "name": array[i]['samplename'],
                "children": [{
                    "name": "CNV " + cnv_tot,
                    "children": [{
                        "name": "Gain",
                        "value": array[i].cnv_gain,
                        "parent": "CNV"
                    }, {
                        "name": "Loss",
                        "value": array[i].cnv_loss,
                        "parent": "CNV"
                    }]

                        "parent": "SNP/INDELS"
                    }]
                }]
            };
            return json_var
        }
