<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--css-->
    <link rel="stylesheet" href="../js/bootstrap-3.3.7/dist/css/bootstrap.2.3.1.min.css">
    <link rel="stylesheet" href="../js/bootstrap-3.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/custom.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../js/PhotoSwipe-master/dist/photoswipe.css">
    <link rel="stylesheet" href="../js/PhotoSwipe-master/dist/default-skin/default-skin.css">
    <link rel="stylesheet" href="../js/tablesorter-master/addons/pager/jquery.tablesorter.pager.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">

    <!--tools-->
    <script src="../js/jquery-3.3.1.min.js"></script>
    <script src="../js/bootstrap-3.3.7/dist/js/bootstrap.min.js"></script>
    <script src="../js/d3/d3.js"></script>
    <script src="../js/PhotoSwipe-master/dist/photoswipe.min.js"></script>
    <script src="../js/PhotoSwipe-master/dist/photoswipe-ui-default.min.js"></script>
    <script src="../js/PhotoSwipe-master/dist/main.js"></script>
    <script src="../js/tablesorter-master/js/jquery.tablesorter.js"></script>
    <script src="../js/tablesorter-master/js/jquery.tablesorter.widgets.js"></script>
    <script src="../js/tablesorter-master/addons/pager/jquery.tablesorter.pager.js"></script>
    <script src="../js/tablesorter-master/tablesorter.js"></script>

    <!--json data-->
    <script src="./Stat_summary/Stat_summary.js"></script>
    <script src="../main.js"></script>

    <script>
        var array;
        var config;
        var stat;
        var sampleData;
        var ordernumber = array.project;
        var customer = array.name;
        var institute = array.institute;
        var curtime = array.curtime;
        var application = array.application;
        var appCode = array.appCode;
        var numberofsample = array.numberofsample;

        document.title = ordernumber + " (" + customer + ") - MAS Analysis Report";

        // 1000의 자리마다 , 추가
        function AddComma(data_value) {
            return Number(data_value).toLocaleString('en');
        }

        // 테이블에 데이터 삽입
        function populateTable() {
            var tableHead = document.querySelector('.tablesorter thead tr');
            var tableBody = document.getElementById('tb_fastq_raw');

            // 테이블 헤더 생성
            var headers = Object.keys(stat[0]);
            headers.forEach(function (header) {
                var th = document.createElement('th');
                th.className = 'th_center';
                th.innerText = header;
                tableHead.appendChild(th);
            });

            // 테이블 바디 생성
            stat.forEach(function (sample) {
                var tr = document.createElement('tr');
                var html_str = "";

                headers.forEach(function (header) {
                    if (header === "Sample Name") {
                        html_str += "<td class='td_char'>" + sample[header] + "</td>";
                    } else {
                        html_str += "<td class='td_num' style='text-align:center;'>" + AddComma(sample[header]) + "</td>";
                    }
                });

                tr.innerHTML = html_str;
                tableBody.appendChild(tr);
            });
        }

        // 컬럼 정보 삽입
        function populateColumnInfo() {
            var columnInfoDiv = document.getElementById('column_info');
            var html_str = "<h4><b>Column Information</b></h4><ul class='column-info-list'>";

            for (var key in column_info) {
                if (column_info.hasOwnProperty(key)) {
                    html_str += "<li><span class='bullet'>•</span> <b>" + key + ":</b> " + column_info[key] + "</li>";
                }
            }

            html_str += "</ul>";
            columnInfoDiv.innerHTML = html_str;
        }

        document.addEventListener('DOMContentLoaded', function () {
            populateTable();
            populateColumnInfo();
        });
    </script>
    <style>
        a:hover {
            color: #920783;
            text-decoration: underline;
        }

        .column-info-list {
            list-style-type: none;
            padding: 10px;
            margin: 0;
            font-size: 14px;
            line-height: 1.8;
            background-color: #f4f4f4;
            border-radius: 4px;
            margin-top: 10px;
            /* 제목 아래 여백 추가 */
        }

        .column-info-list li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .column-info-list li .bullet {
            color: #333;
            font-size: 16px;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .column-info-list li b {
            color: #333;
        }
    </style>
</head>

<body class="total_font">
    <div id="wrap">
        <!--header-->
        <header id="header">
            <div class="header-wrap clearfix">
                <div class="logo">
                    <a href="../../Report.html"><img src="../img/logo.png" alt="MACROGEN LOGO"></a>
                </div>
                <div class="center-txt sans_font"><b id="banner_id"></b></div>
                <script>
                    document.getElementById('banner_id').innerHTML = application;
                </script>
                <p class="notice">Research Use Only</p>
            </div>
            <nav class="navbar">
                <ul id="navbar_ui"></ul>
                <script>
                    function generateMenuHtml(menuArray) {
                        let html = '';
                        menuArray.forEach(item => {
                            if (item.category) { // 변경
                                html += '<li class="dropdown-submenu"><a href="#">' + item.name + '</a>';
                                html += '<ul class="dropdown-menu">';
                                html += generateMenuHtml(item.path); // 재귀적으로 하위 메뉴 생성
                                html += '</ul></li>';
                            } else if (item.display) {
                                if (item.path === "") {
                                    html += "<li><p>" + item.name + "</p></li>";
                                } else {
                                    html += "<li><a href=\"" + item.path.replace("/src", ".") + "\">" + item.name + "</a></li>";
                                }
                            }
                        });
                        return html;
                    }

                    var html = "";
                    var nav_ = document.getElementById('navbar_ui');
                    if (array.page) {
                        array.page.forEach(page => {
                            if (page.category) {
                                let tmphtml = '<li class="dropdown" id="contiganal"><a class="dropdown-toggle" data-toggle="dropdown" href="#">' + page.name + '<span class="caret"></span></a><ul class="dropdown-menu">';
                                tmphtml += generateMenuHtml(page.path);
                                tmphtml += '</ul></li>';
                                html += tmphtml;
                            } else if (page.path && page.path[0] && page.path[0].display) {
                                html += '<li><a href="' + page.path[0].path.replace("/src", ".") + '">' + page.path[0].name + '</a></li>';
                            }
                        });
                    }
                    nav_.innerHTML = html;
                </script>
            </nav>
        </header>

        <div class="container">
            <div class="row">
                <div>
                    <!--icon-->
                    <div class="div_icon">
                        <img src="../img/Icon_img/VARIANT_stats.png">
                    </div>
                    <!--title-->
                    <div class="div_h1">
                        <h1>QC Statistics</h1>
                    </div>
                </div>
                <div class="col-sm-12">
                    <br>
                    <!--Yield chart-->
                    <div class="panel-group" id="Yield">
                        <div class="panel panel-default">
                            <!--Panel head-->
                            <div class="panel-heading">
                                <h4 class="panel-title">
                                    <a data-toggle="collapse" href="#collapse_1"><b>Data Summary</b></a>
                                </h4>
                            </div>
                            <div id="collapse_1" class="panel-collapse collapse in">
                                <div class="panel-body xy_scroll">
                                    <div style="position: relative;">
                                        <button id="reset_yield"
                                            style="position: relative; top: 30px; left: 20px;">Reset</button>
                                        <svg id="chart_yield" width="1100" height="300" aria-labelledby="graph-title"
                                            aria-describedby="graph-desc"></svg>
                                        <p style="margin-right:50px;text-align: right; ">Mouseover: Display read count
                                            values<br>Scroll: Zoom in/out<br>Drag: Move focus</p>
                                        <script src="./Stat_summary/chart_yield.js"></script>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <br>
                    <!--Fastq stats table-->
                    <div class="panel-group" id="Fastqstats_raw">
                        <div class="panel panel-default">
                            <!--Panel head-->
                            <div class="panel-heading">
                                <h4 class="panel-title">
                                    <a data-toggle="collapse" href="#collapse_2"><b>Data Statistics</b></a>
                                </h4>
                            </div>
                            <div id="collapse_2" class="panel-collapse collapse in ">
                                <div class="panel-body xy_scroll">
                                    <table class="table tablesorter">
                                        <thead>
                                            <tr></tr>
                                        </thead>
                                        <tbody id="tb_fastq_raw"></tbody>
                                    </table>
                                    <!--Pager-->
                                    <div id="pager">
                                        <div id="pager_raw" class="pager">
                                            <form>
                                                <img src="../js/tablesorter-master/addons/pager/icons/first.png"
                                                    class="first" />
                                                <img src="../js/tablesorter-master/addons/pager/icons/prev.png"
                                                    class="prev" />
                                                <span class="pagedisplay"></span>
                                                <img src="../js/tablesorter-master/addons/pager/icons/next.png"
                                                    class="next" />
                                                <img src="../js/tablesorter-master/addons/pager/icons/last.png"
                                                    class="last" />
                                                <select class="pagesize">
                                                    <option value="all">All Samples</option>
                                                    <option value="10">10 samples per page</option>
                                                </select>
                                            </form>
                                        </div>
                                    </div>
                                    <!-- Column Information -->
                                    <div id="column_info" style="margin-top: 20px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
