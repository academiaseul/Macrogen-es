    <style>
      html, body {
       overflow-x: hidden;

      }

      nav {

      }

        -webkit-transform: rotate(45deg);
        -moz-transform: rotate(45deg);

        -o-transform: rotate(45deg);
        transform: rotate(45deg);
      }

    <div class="container" id="main_display">
      <div class="row">
        <div class="col-md-8">
          <div class="btn-toolbar" role="toolbar" id="toolbar" style="">
            <div class="btn-group">
              <button
                type="button"
                class="btn btn-light btn-sm"
                data-direction="vertical"
                data-amount="1"

              >

              </button>

              >
                <i class="fa  fa-compress fa-rotate-135"  style="width:30px"></i>
              </button>
              
           
              <button
                type="button"

             <div  class="btn-group"  id="bs-example-navbar-collapse-1">

                        />

          </div>

    <script>
      const query = new URLSearchParams(window.location.search);
    //  const group = parseInt(query.get("group"));

      const valuesRaw = decodeURIComponent(query.get("values"));
      const values = JSON.parse(valuesRaw);
      
      const gcolorRaw = decodeURIComponent(query.get("gcolors"));
      const gcolors = JSON.parse(gcolorRaw);
      const maxKeyLength = Math.max(...Object.keys(gcolors).map(key => key.length));
      console.log(maxKeyLength);

        //document.getElementById("List"+i).style.display="block";
        //document.getElementById("name_pa_"+i).value=values[i-1].a;
        ////document.getElementById("name_pa_"+i).disabled = true;
        //document.getElementById("area_pa_"+i).value=values[i-1].b.join('\n');

      var test_string=values;
      //var gcolors;
      //var show_gcolor;
      
      $(document).ready(function() {
        tree = new phylotree.phylotree(test_string);
       
        global_tree = tree;

        tree.render({
          container: "#tree_container",
          "draw-size-bubbles": false,
          "bubble-styler": d => { return 5 },
       //   "node-styler": node_colorizer,
          //"font-size": 40,
           zoom: false,
        //  "edge-styler": edge_colorizer,
          "gcolors": gcolors,
          "show-gcolor":true,
         // "height":1000,
         // "width":400
          "maxKeyLength":maxKeyLength
        });

        $('#tree_container').on('reroot', function (e) {  
          update_selection_names();

          tree.display.countHandler(count => {
            $("#selected_branch_counter").text(function(d) {
              return count[current_selection_name];
            });
          });

        });

        tree.display.selectionLabel(current_selection_name);

        tree.display.countHandler(count => {
          $("#selected_branch_counter").text(function(d) {
            return count[current_selection_name];
          });
        });

        // Get selection set names from parsed newick
        if (tree.parsed_tags.length) {
          selection_set = tree.parsed_tags;
        }

        // Until a cleaner solution to supporting both Observable and regular HTML
        $(tree.display.container).append(tree.display.show());

        

        update_selection_names();

        $("#save_image").on("click", function(e) {
         // datamonkey_save_image("svg", "#tree_container");
          screenshot(maxKeyLength);
        });
      });

      function screenshot(maxKeyLength) {
      const target = document.getElementById("tree_container");
      if (maxKeyLength < 13){
        target.style.width = "1000px"; 
      }else{
        target.style.width = "1100px"; 
      } 
      html2canvas(target, {
        backgroundColor: "#FFFFFF", 
        useCORS: true
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "UPGMA_Tree.png";
        link.href = canvas.toDataURL();
        link.click();
      });
    }
    </script>
